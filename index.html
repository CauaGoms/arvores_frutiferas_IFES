<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Árvores Frutíferas - Campus IFES Cachoeiro de Itapemirim</title>
        <!-- Google Fonts -->
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
        <!-- Leaflet CSS -->
        <link
            rel="stylesheet"
            href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
            integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
            crossorigin=""
        >
        <!-- Leaflet Routing Machine CSS -->
        <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css">
        <!-- Custom CSS -->
        <link rel="stylesheet" href="style.css">
        <!-- Font Awesome for icons -->
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    </head>
    <body>
        <div class="app-container">
            <!-- Sidebar -->
            <aside class="sidebar">
                <div class="sidebar-header">
                    <div class="ifes-logo">
                        <i class="fas fa-leaf"></i>
                    </div>
                    <h1>Frutíferas IFES</h1>
                    <p>Campus Cachoeiro de Itapemirim</p>
                </div>
                <div class="search-container">
                    <input
                        type="text"
                        id="search-input"
                        placeholder="Buscar árvore..."
                        aria-label="Buscar árvore"
                    >
                    <i class="fas fa-search"></i>
                </div>
                <ul id="tree-list" class="tree-list" role="list">
                    <!-- Items adicionados dinamicamente --></ul>
            </aside>
            <!-- Botão hamburger -->
            <button
                id="menu-toggle"
                class="menu-toggle"
                aria-label="Abrir menu"
                aria-expanded="false"
            >
                <i class="fas fa-bars"></i>
            </button>
            <!-- Área do mapa -->
            <main class="map-container">
                <div id="map" role="region" aria-label="Mapa interativo"></div>
                <!-- Card de informações flutuante -->
                <div
                    id="info-card"
                    class="info-card hidden"
                    role="dialog"
                    aria-labelledby="card-title"
                >
                    <button id="close-card" class="close-btn" aria-label="Fechar">&times;</button>
                    <div class="card-header">
                        <h2 id="card-title">Nome da Árvore</h2>
                    </div>
                    <h3 id="card-species" class="card-species">Espécie Científica</h3>
                    <p id="card-desc" class="card-location">Descrição do local.</p>
                    <div class="card-actions">
                        <button id="btn-route" class="btn-primary" aria-label="Traçar rota até esta árvore">
                            <i class="fas fa-route"></i>
                            Traçar Rota
                        </button>
                        <div id="route-status" class="route-status" role="status"></div>
                    </div>
                </div>
            </main>
        </div>
        <!-- Scripts -->
        <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
        <script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>
        <script src="script.js"></script>
    </body>
</html>
